name: Docker Compose CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docker/**'
      - '.github/workflows/docker-compose-ci.yml'
  pull_request:
    branches: [ main, develop ]

jobs:
  test-docker-compose:
    name: Test Docker Compose Setup
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build images
      run: |
        export SECRET_KEY=$(openssl rand -hex 32)
        docker-compose -f docker/docker-compose.yml build

    - name: Start services
      run: |
        export SECRET_KEY=$(openssl rand -hex 32)
        docker-compose -f docker/docker-compose.yml up -d

    - name: Wait for services
      run: |
        echo "Waiting for backend to be ready..."
        timeout 60 bash -c 'until curl -f http://localhost:8000/docs; do sleep 2; done'
        echo "✅ Backend is ready"

        echo "Waiting for frontend to be ready..."
        timeout 60 bash -c 'until curl -f http://localhost/; do sleep 2; done'
        echo "✅ Frontend is ready"

    - name: Test backend health
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/docs)
        if [ $response -eq 200 ]; then
          echo "✅ Backend health check passed"
        else
          echo "❌ Backend health check failed with status $response"
          exit 1
        fi

    - name: Test frontend health
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/)
        if [ $response -eq 200 ]; then
          echo "✅ Frontend health check passed"
        else
          echo "❌ Frontend health check failed with status $response"
          exit 1
        fi

    - name: View logs on failure
      if: failure()
      run: |
        echo "=== Backend Logs ==="
        docker-compose -f docker/docker-compose.yml logs backend
        echo "=== Frontend Logs ==="
        docker-compose -f docker/docker-compose.yml logs frontend

    - name: Stop services
      if: always()
      run: docker-compose -f docker/docker-compose.yml down -v
