name: Frontend CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'docker/frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'frontend/**'
      - 'docker/frontend/**'

jobs:
  test:
    name: Test Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Lint code
      working-directory: ./frontend
      run: npm run lint || echo "No lint script found"
      continue-on-error: true

    - name: Run tests
      working-directory: ./frontend
      run: npm test -- --passWithNoTests || echo "No tests found"
      continue-on-error: true

    - name: Build application
      working-directory: ./frontend
      env:
        VITE_API_URL: https://api.example.com
      run: npm run build

    - name: Check build output
      run: |
        if [ ! -d "frontend/dist" ]; then
          echo "❌ Build failed - dist directory not found"
          exit 1
        fi
        echo "✅ Build successful"

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build frontend image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/frontend/Dockerfile
        push: false
        tags: taskmanager-frontend:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Railway CLI
      run: npm install -g @railway/cli

    - name: Deploy Frontend to Railway
      env:
        RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      run: |
        if [ -n "$RAILWAY_TOKEN" ]; then
          railway up --service frontend
        else
          echo "⚠️  RAILWAY_TOKEN not set. Skipping Railway deployment."
          echo "Add RAILWAY_TOKEN to repository secrets to enable automatic deployment."
        fi
      continue-on-error: true
