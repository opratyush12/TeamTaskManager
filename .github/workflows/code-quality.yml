name: Code Quality

on:
  pull_request:
    branches: [ main, develop ]
  push:
    branches: [ main, develop ]

jobs:
  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python linters
      run: |
        pip install flake8 black isort

    - name: Check Python formatting with Black
      run: black --check app/
      continue-on-error: true

    - name: Check Python imports with isort
      run: isort --check-only app/
      continue-on-error: true

    - name: Lint Python with flake8
      run: flake8 app/ --max-line-length=127 --extend-ignore=E203,E266,E501,W503
      continue-on-error: true

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Lint frontend
      working-directory: ./frontend
      run: npm run lint || echo "Lint script not configured"
      continue-on-error: true

    - name: Check for security vulnerabilities
      run: |
        echo "=== Python Security Audit ==="
        pip install safety
        safety check --json || echo "Safety check completed with warnings"

        echo "=== Frontend Security Audit ==="
        cd frontend
        npm audit --audit-level=moderate || echo "npm audit completed with warnings"
      continue-on-error: true
